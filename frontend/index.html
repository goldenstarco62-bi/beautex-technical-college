<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon-v2.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#800000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Beautex Technical Training College</title>
</head>

<body>
    <div id="root">
        <div
            style="background: #800000; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; flex-direction: column;">
            <div
                style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #FFD700; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <p
                style="margin-top: 20px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; font-size: 10px;">
                Establishing Connection...</p>
            <style>
                @keyframes spin {
                    to {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker Registered', reg.scope);
                        // Check for updates every time the page loads
                        reg.update();
                        // When a new SW is waiting, activate it immediately
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('[SW] New version available, activating...');
                                    newWorker.postMessage({ action: 'skipWaiting' });
                                }
                            });
                        });
                    })
                    .catch(err => console.error('❌ SW Registration Failed: ', err));

                // When a new SW takes control, reload once to get fresh content
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }
    </script>
</body>

</html>
